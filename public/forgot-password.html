<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - QA Task Manager</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth-split.css" />
</head>
<body class="split-body">
  <div class="split-container">
    <div class="split-left">
      <div class="split-form-wrap">
        <div class="brand-logo">✅ QA Task Manager</div>
        <h1 class="split-title">Forgot password?</h1>
        <p class="split-subtitle">No worries — enter your registered email and we'll send you a reset link.</p>

        <form id="forgotForm" novalidate>
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
          <button type="submit" class="btn-split-primary" id="forgotBtn">Send reset link</button>
        </form>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="link-row" style="margin-top:20px">
          ← <a href="/login.html">Back to login</a>
        </div>
      </div>
    </div>
    <div class="split-right">
      <div class="split-right-content">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" class="hero-svg" style="max-width:280px">
          <rect x="60" y="80" width="280" height="160" rx="16" fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-width="2"/>
          <path d="M60 96 L200 175 L340 96" stroke="#fff" stroke-width="2.5" fill="none" stroke-opacity="0.7"/>
          <circle cx="200" cy="200" r="40" fill="#10b981" fill-opacity="0.9"/>
          <text x="184" y="208" font-size="28" fill="#fff">🔑</text>
        </svg>
        <h2 class="split-right-title">Password reset<br/>made easy</h2>
        <p class="split-right-sub">We'll email you a secure link to reset your password right away.</p>
      </div>
    </div>
  </div>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
