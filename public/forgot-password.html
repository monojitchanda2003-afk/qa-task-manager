<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - QA Task</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="qa-task-logo.svg">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div style="text-align:center; margin-bottom:20px;">
      <img src="qa-task-logo.svg" alt="QA Task Logo" style="height:50px;">
    </div>
    <h1>QA Task Manager</h1>
    <p style="text-align:center; color:#555; margin-bottom:20px;">No worries — enter your registered email and we'll send you a reset link.</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="forgotForm" novalidate>
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" />
      <button type="submit" class="btn-primary" id="forgotBtn">Send reset link</button>
    </form>

    <div class="link-row" style="margin-top:20px;">
      ← <a href="/login.html">Back to login</a>
    </div>
  </div>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
