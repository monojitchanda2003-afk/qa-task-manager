<svg width="400" height="110" viewBox="0 0 400 110" role="img" xmlns="http://www.w3.org/2000/svg">
<title>QA Task Logo</title>
<desc>Overlapping squares logo with QA Task text</desc>

<!-- Green square (top-left) -->
<rect x="8" y="8" width="42" height="42" rx="10" fill="#43A047"/>

<!-- Magenta/pink square (bottom-left) -->
<rect x="14" y="42" width="42" height="42" rx="10" fill="#E91E8C"/>

<!-- Blue square (right, overlapping both) -->
<rect x="40" y="24" width="42" height="42" rx="10" fill="#3B82F6"/>

<!-- QA Task text -->
<text x="100" y="55" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="34" fill="#1f2937" letter-spacing="1">QA Task</text>
<text x="101" y="79" font-family="'Segoe UI', Arial, sans-serif" font-weight="500" font-size="15" fill="#6b7280" letter-spacing="0.4">Manage your QA tasks smarter</text>
</svg>
