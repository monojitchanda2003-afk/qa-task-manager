<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - QA Task</title>
  <link rel="icon" type="image/svg+xml" href="qa-task-logo.svg">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div style="text-align:center; margin-bottom:20px;">
      <img src="qa-task-logo.svg" alt="QA Task Logo" style="height:50px;">
    </div>
    <h1>QA Task Manager</h1>
    <p style="text-align:center; color:#555; margin-bottom:20px;">Create your free account and start tracking bugs and tasks.</p>

    <div class="error-msg" id="errorMsg" data-testid="signup-error"></div>
    <div class="success-msg" id="successMsg" data-testid="signup-success"></div>

    <form id="signupForm" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" data-testid="signup-username" placeholder="3–20 characters" />

      <label for="email">Email address</label>
      <input type="email" id="email" name="email" data-testid="signup-email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <div style="position:relative;">
        <input type="password" id="password" name="password" data-testid="signup-password" placeholder="At least 6 characters" style="padding-right:40px;" />
        <span onclick="togglePw('password', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;">👁</span>
      </div>

      <label for="confirmPassword">Confirm Password</label>
      <div style="position:relative;">
        <input type="password" id="confirmPassword" name="confirmPassword" data-testid="signup-confirm-password" placeholder="Re-enter password" style="padding-right:40px;" />
        <span onclick="togglePw('confirmPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;">👁</span>
      </div>

      <button type="submit" class="btn-primary" id="signupBtn" data-testid="signup-submit">Create account</button>
    </form>

    <div class="link-row">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script>
    function togglePw(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    }
  </script>
  <script src="/js/signup.js"></script>
</body>
</html>
