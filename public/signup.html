<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - QA Task</title>
  <link rel="icon" type="image/svg+xml" href="qa-task-logo.svg">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div style="text-align:center; margin-bottom:20px;">
      <img src="qa-task-logo.svg" alt="QA Task Logo" style="height:50px;">
    </div>
    <h1>QA Task Manager</h1>
    <p style="text-align:center; color:#555; margin-bottom:20px;">Create your free account and start tracking bugs and tasks.</p>

    <div class="error-msg" id="errorMsg" data-testid="signup-error"></div>
    <div class="success-msg" id="successMsg" data-testid="signup-success"></div>

    <form id="signupForm" novalidate>
      <label for="username">Username</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </span>
        <input type="text" id="username" name="username" data-testid="signup-username" placeholder="3–20 characters" />
      </div>

      <label for="email">Email address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </span>
        <input type="email" id="email" name="email" data-testid="signup-email" placeholder="you@example.com" />
      </div>

      <label for="password">Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
        </span>
        <input type="password" id="password" name="password" data-testid="signup-password" placeholder="At least 6 characters" class="pw-toggle-target" />
        <span class="toggle-icon" onclick="togglePw('password', this)">👁</span>
      </div>

      <label for="confirmPassword">Confirm Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
        </span>
        <input type="password" id="confirmPassword" name="confirmPassword" data-testid="signup-confirm-password" placeholder="Re-enter password" class="pw-toggle-target" />
        <span class="toggle-icon" onclick="togglePw('confirmPassword', this)">👁</span>
      </div>

      <button type="submit" class="btn-primary" id="signupBtn" data-testid="signup-submit">Create account</button>
    </form>

    <div class="link-row">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>

  <script>
    function togglePw(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    }
  </script>
  <script src="/js/signup.js"></script>
</body>
</html>
