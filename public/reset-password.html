<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — QA Task Manager</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="/css/saas.css"/>
  <link rel="stylesheet" href="/css/auth-split.css"/>
</head>
<body class="split-body">
<div id="loader" class="loader-overlay">
  <div class="loader-spinner"></div>
  <span style="font-size:13px;color:var(--text2)">Loading...</span>
</div>
<div id="navbar-placeholder"></div>
<div class="split-container">
  <div class="split-left">
    <div class="split-form-wrap">
      <h1 class="split-title">Reset password</h1>
      <p class="split-subtitle">Enter your new password below.</p>
      <form id="resetForm" novalidate>
        <label for="password">New Password</label>
        <div class="password-wrap">
          <input type="password" id="password" data-testid="reset-password" placeholder="At least 6 characters"/>
          <span class="toggle-pw" onclick="togglePw('password',this)">👁</span>
        </div>
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" data-testid="reset-confirm-password" placeholder="Re-enter password"/>
          <span class="toggle-pw" onclick="togglePw('confirmPassword',this)">👁</span>
        </div>
        <button type="submit" class="btn-split-primary" id="resetBtn" data-testid="reset-submit">Reset password</button>
      </form>
      <div class="alert alert-error"   id="errorMsg"   data-testid="reset-error"   style="margin-top:12px;"></div>
      <div class="alert alert-success" id="successMsg" data-testid="reset-success" style="margin-top:12px;"></div>
      <div class="link-row" style="margin-top:20px;">← <a href="/login.html">Back to login</a></div>
    </div>
  </div>
  <div class="split-right">
    <div class="split-right-content">
      <svg viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg" class="hero-svg">
        <rect x="110" y="160" width="180" height="120" rx="10" fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-width="2"/>
        <rect x="120" y="170" width="160" height="95" rx="6" fill="#7c3aed" fill-opacity="0.5"/>
        <circle cx="200" cy="130" r="32" fill="#c4b5fd"/>
        <rect x="170" y="195" width="60" height="45" rx="6" fill="#fff" fill-opacity="0.85"/>
        <rect x="185" y="180" width="30" height="25" rx="12" fill="none" stroke="#fff" stroke-width="6"/>
        <circle cx="200" cy="217" r="6" fill="#10b981"/>
        <polyline points="194,217 198,222 207,210" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <rect x="40" y="60" width="44" height="34" rx="8" fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-opacity="0.4" stroke-width="1.5"/>
        <text x="55" y="83" font-size="16" fill="#fff">🔒</text>
        <rect x="316" y="80" width="44" height="34" rx="8" fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-opacity="0.4" stroke-width="1.5"/>
        <text x="330" y="103" font-size="16" fill="#fff">✅</text>
        <circle cx="200" cy="340" r="5" fill="#fff" fill-opacity="0.6"/>
        <circle cx="218" cy="340" r="5" fill="#fff" fill-opacity="0.3"/>
      </svg>
      <h2 class="split-right-title">Almost there!</h2>
      <p class="split-right-sub">Choose a strong new password to keep your account secure.</p>
    </div>
  </div>
</div>
<script>
  function togglePw(id,el){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';el.textContent=i.type==='password'?'👁':'🙈';}
  (function(){const d=localStorage.getItem('qa-dark');if(d==='true')document.documentElement.setAttribute('data-theme','dark');})();
</script>
<script src="/js/shared.js"></script>
<script src="/js/reset-password.js"></script>
</body></html>
