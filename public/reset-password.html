<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - QA Task</title>
  <link rel="icon" type="image/svg+xml" href="qa-task-logo.svg">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <div style="text-align:center; margin-bottom:20px;">
      <img src="qa-task-logo.svg" alt="QA Task Logo" style="height:50px;">
    </div>
    <h1>QA Task Manager</h1>
    <p style="text-align:center; color:#555; margin-bottom:20px;">Enter your new password below.</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="resetForm" novalidate>
      <label for="password">New Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
        </span>
        <input type="password" id="password" placeholder="At least 6 characters" class="pw-toggle-target" />
        <span class="toggle-icon" onclick="togglePw('password', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </span>
      </div>

      <label for="confirmPassword" style="margin-top:14px;">Confirm Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
        </span>
        <input type="password" id="confirmPassword" placeholder="Re-enter password" class="pw-toggle-target" />
        <span class="toggle-icon" onclick="togglePw('confirmPassword', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </span>
      </div>

      <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
    </form>

    <div class="link-row">
      <a href="/login.html">← Back to login</a>
    </div>
  </div>

  <script>
    const EYE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    const EYE_OFF_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';

    function togglePw(id, iconEl) {
      const p = document.getElementById(id);
      const willShow = p.type === 'password';
      p.type = willShow ? 'text' : 'password';
      iconEl.innerHTML = willShow ? EYE_OFF_ICON : EYE_ICON;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      if (!token) {
        errorMsg.textContent = 'Invalid or missing reset token.';
        errorMsg.style.display = 'block';
        return;
      }

      const resets = JSON.parse(localStorage.getItem('qa_resets') || '{}');
      const resetData = resets[token];

      if (!resetData || Date.now() > resetData.expiry) {
        errorMsg.textContent = 'Reset link has expired. Please request a new one.';
        errorMsg.style.display = 'block';
        return;
      }

      document.getElementById('resetForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password.length < 6) {
          errorMsg.textContent = 'Password must be at least 6 characters.';
          errorMsg.style.display = 'block';
          return;
        }

        if (password !== confirmPassword) {
          errorMsg.textContent = 'Passwords do not match.';
          errorMsg.style.display = 'block';
          return;
        }

        const users = JSON.parse(localStorage.getItem('qa_users') || '[]');
        const idx = users.findIndex(u => u.email === resetData.email);

        if (idx !== -1) {
          users[idx].password = password;
          localStorage.setItem('qa_users', JSON.stringify(users));
          delete resets[token];
          localStorage.setItem('qa_resets', JSON.stringify(resets));
          successMsg.textContent = 'Password reset successful! Redirecting to login...';
          successMsg.style.display = 'block';
          setTimeout(() => { window.location.href = '/login.html'; }, 1500);
        }
      });
    });
  </script>
</body>
</html>
