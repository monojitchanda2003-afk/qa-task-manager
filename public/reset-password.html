<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - QA Task Manager</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth-split.css" />
</head>
<body class="split-body">
  <div class="split-container">
    <div class="split-left">
      <div class="split-form-wrap">
        <div class="brand-logo">✅ QA Task Manager</div>
        <h1 class="split-title">Set new password</h1>
        <p class="split-subtitle">Your new password must be at least 6 characters.</p>

        <form id="resetForm" novalidate>
          <label for="password">New Password</label>
          <div class="password-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" />
            <span class="toggle-pw" onclick="togglePw('password', this)">👁</span>
          </div>
          <label for="confirmPassword">Confirm New Password</label>
          <div class="password-wrap">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" />
            <span class="toggle-pw" onclick="togglePw('confirmPassword', this)">👁</span>
          </div>
          <button type="submit" class="btn-split-primary" id="resetBtn">Reset password</button>
        </form>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="link-row" style="margin-top:20px">
          ← <a href="/login.html">Back to login</a>
        </div>
      </div>
    </div>
    <div class="split-right">
      <div class="split-right-content">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" class="hero-svg" style="max-width:280px">
          <circle cx="200" cy="130" r="70" fill="#fff" fill-opacity="0.12" stroke="#fff" stroke-width="2"/>
          <circle cx="200" cy="130" r="48" fill="#10b981" fill-opacity="0.85"/>
          <polyline points="182,130 196,144 222,116" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <rect x="80" y="220" width="240" height="12" rx="6" fill="#fff" fill-opacity="0.15"/>
          <rect x="120" y="242" width="160" height="10" rx="5" fill="#fff" fill-opacity="0.1"/>
        </svg>
        <h2 class="split-right-title">Almost there!</h2>
        <p class="split-right-sub">Create a strong password to keep your account safe and secure.</p>
      </div>
    </div>
  </div>
  <script>
    function togglePw(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    }
  </script>
  <script src="/js/reset-password.js"></script>
</body>
</html>
