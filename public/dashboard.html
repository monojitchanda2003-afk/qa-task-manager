<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Task</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container wide">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <img src="qa-task-logo.svg" alt="QA Task Logo" style="height:40px;">
        <h1 id="welcomeMsg" data-testid="welcome-message">Welcome</h1>
      </div>
      <button class="btn-secondary" id="logoutBtn" data-testid="logout-button">Logout</button>
    </div>
    <div class="task-form">
      <label for="taskTitle">Title</label>
      <input type="text" id="taskTitle" data-testid="task-title-input" placeholder="Task title" />
      <label for="taskDescription">Description</label>
      <textarea id="taskDescription" data-testid="task-description-input" rows="2" placeholder="Optional description"></textarea>
      <label for="taskStatus">Status</label>
      <select id="taskStatus" data-testid="task-status-input">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
      <button class="btn-primary" id="addTaskBtn" data-testid="add-task-button">Add Task</button>
    </div>
    <div class="error-msg" id="errorMsg" data-testid="dashboard-error"></div>
    <div class="success-msg" id="successMsg" data-testid="dashboard-success"></div>
    <div class="filters">
      <button class="btn-secondary active" data-filter="all" data-testid="filter-all">All</button>
      <button class="btn-secondary" data-filter="pending" data-testid="filter-pending">Pending</button>
      <button class="btn-secondary" data-filter="in-progress" data-testid="filter-in-progress">In Progress</button>
      <button class="btn-secondary" data-filter="completed" data-testid="filter-completed">Completed</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="taskTableBody" data-testid="task-table-body">
        <!-- Task rows injected by dashboard.js -->
      </tbody>
    </table>
    <p id="emptyMsg" data-testid="empty-message" style="display:none; margin-top:16px; color:#888;">No tasks found.</p>
  </div>
  <script src="/js/dashboard.js"></script>
</body>
</html>
