<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Task Manager</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>QA Task Manager</h1>
    <p>A simple app for practicing Manual, API, and Automation testing.</p>
    <a href="/login.html"><button class="btn-primary" id="goLogin" data-testid="go-login">Login</button></a>
    <a href="/signup.html"><button class="btn-primary" id="goSignup" data-testid="go-signup">Sign Up</button></a>
  </div>

  <script>
    // If already logged in, send the user straight to the dashboard
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }
  </script>
</body>
</html>
