<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact — QA Task Manager</title>
  <link rel="stylesheet" href="/css/saas.css"/>
  <link rel="stylesheet" href="/css/auth-split.css"/>
</head>
<body>
<div id="loader" class="loader-overlay">
  <div class="loader-spinner"></div>
  <span style="font-size:13px;color:var(--text2)">Loading...</span>
</div>
<div id="navbar-placeholder"></div>
<div class="page-wrap">
  <div class="page-hero">
    <h1>Get in Touch</h1>
    <p>Have a question or want to collaborate? Reach out — I'd love to hear from you.</p>
  </div>
  <div class="contact-grid">
    <div>
      <div class="contact-info-item">
        <div class="contact-info-icon">🐙</div>
        <div>
          <h4 style="font-weight:600;color:var(--text);margin-bottom:3px;">GitHub</h4>
          <a href="https://github.com/monojitchanda2003-afk" target="_blank" style="color:var(--primary);font-size:14px;">github.com/monojitchanda2003-afk</a>
        </div>
      </div>
      <div class="contact-info-item">
        <div class="contact-info-icon">💼</div>
        <div>
          <h4 style="font-weight:600;color:var(--text);margin-bottom:3px;">LinkedIn</h4>
          <a href="https://linkedin.com/in/monojitchanda" target="_blank" style="color:var(--primary);font-size:14px;">linkedin.com/in/monojitchanda</a>
        </div>
      </div>
      <div class="contact-info-item">
        <div class="contact-info-icon">📧</div>
        <div>
          <h4 style="font-weight:600;color:var(--text);margin-bottom:3px;">Email</h4>
          <a href="mailto:monojitchanda@email.com" style="color:var(--primary);font-size:14px;">monojitchanda@email.com</a>
        </div>
      </div>
      <div class="contact-info-item">
        <div class="contact-info-icon">📍</div>
        <div>
          <h4 style="font-weight:600;color:var(--text);margin-bottom:3px;">Location</h4>
          <p style="font-size:14px;color:var(--text2);">India 🇮🇳</p>
        </div>
      </div>
    </div>
    <div class="card">
      <h3 class="card-title" style="margin-bottom:20px;">Send a Message</h3>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Your Name</label>
        <input type="text" id="cName" placeholder="Monojit Chanda"/>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Email Address</label>
        <input type="email" id="cEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Subject</label>
        <input type="text" id="cSubject" placeholder="Collaboration / Feedback / Bug Report"/>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Message</label>
        <textarea id="cMsg" rows="4" placeholder="Write your message here..."></textarea>
      </div>
      <button class="btn btn-green" style="width:100%;justify-content:center;" onclick="submitContact()">Send Message 📨</button>
      <div class="alert alert-success" id="contactSuccess" style="margin-top:12px;"></div>
    </div>
  </div>
</div>
<script>
function submitContact() {
  const name = document.getElementById('cName').value.trim();
  const email = document.getElementById('cEmail').value.trim();
  const msg = document.getElementById('cMsg').value.trim();
  const el = document.getElementById('contactSuccess');
  if (!name || !email || !msg) { el.style.display='block'; el.className='alert alert-error'; el.textContent='Please fill in all required fields.'; return; }
  el.style.display='block'; el.className='alert alert-success';
  el.textContent='✅ Message sent! Monojit will get back to you soon.';
  document.getElementById('cName').value='';
  document.getElementById('cEmail').value='';
  document.getElementById('cSubject').value='';
  document.getElementById('cMsg').value='';
}
</script>
<div id="footer-placeholder"></div>
<script src="/js/shared.js"></script>
</body></html>
