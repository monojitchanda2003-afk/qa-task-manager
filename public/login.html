<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Task</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div style="text-align:center; margin-bottom:20px;">
      <img src="qa-task-logo.svg" alt="QA Task Logo" style="height:50px;">
    </div>
    <h1>QA Task Manager</h1>
    <p style="text-align:center; color:#555; margin-bottom:20px;">A simple app for practicing Manual, API, and Automation testing.</p>
    <div id="errorMsg" class="error-msg" data-testid="login-error"></div>
    <form id="loginForm" novalidate>
      <label for="email">Email address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </span>
        <input type="email" id="email" data-testid="login-email" placeholder="you@example.com">
      </div>
      <label for="password">Password</label>
      <div class="input-icon-wrap password-wrap">
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
        </span>
        <input type="password" id="password" data-testid="login-password" placeholder="••••••••" class="pw-toggle-target">
        <span class="toggle-icon" onclick="togglePw('password', this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <label style="display:flex;align-items:center;gap:6px;font-weight:400;color:#555;margin:0;">
          <input type="checkbox" style="width:auto;"> Remember for 30 days
        </label>
        <a href="forgot-password.html" style="color:#2e7d32;font-size:13px;">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn" data-testid="login-submit">Sign in</button>
    </form>
    <div class="link-row">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
  <script>
    const EYE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    const EYE_OFF_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';

    function togglePw(id, iconEl) {
      const p = document.getElementById(id);
      const willShow = p.type === 'password';
      p.type = willShow ? 'text' : 'password';
      iconEl.innerHTML = willShow ? EYE_OFF_ICON : EYE_ICON;
    }
  </script>
  <script src="/js/login.js"></script>
</body>
</html>
