<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - QA Task Manager</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Login</h1>
    <form id="loginForm" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" data-testid="login-email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" data-testid="login-password" placeholder="Your password" />

      <button type="submit" class="btn-primary" id="loginBtn" data-testid="login-submit">Login</button>
    </form>

    <div class="error-msg" id="errorMsg" data-testid="login-error"></div>

    <div class="link-row">
      Don't have an account? <a href="/signup.html">Sign up here</a>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
