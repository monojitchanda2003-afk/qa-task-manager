<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Task</title>
  <link rel="icon" type="image/svg+xml" href="qa-task-logo.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div style="text-align:center; margin-bottom:20px;">
      <img src="qa-task-logo.svg" alt="QA Task Logo" style="height:50px;">
    </div>
    <h1>QA Task Manager</h1>
    <p style="text-align:center; color:#555; margin-bottom:20px;">A simple app for practicing Manual, API, and Automation testing.</p>
    <div id="errorMsg" class="error-msg" data-testid="login-error"></div>
    <form id="loginForm" novalidate>
      <label for="email">Email address</label>
      <input type="email" id="email" data-testid="login-email" placeholder="you@example.com">
      <label for="password">Password</label>
      <div class="password-wrap" style="position:relative;">
        <input type="password" id="password" data-testid="login-password" placeholder="••••••••" style="padding-right:40px;">
        <span onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;">👁</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
        <label style="display:flex;align-items:center;gap:6px;font-weight:400;color:#555;margin:0;">
          <input type="checkbox" style="width:auto;"> Remember for 30 days
        </label>
        <a href="forgot-password.html" style="color:#2e7d32;font-size:13px;">Forgot password?</a>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn" data-testid="login-submit">Sign in</button>
    </form>
    <div class="link-row">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
  <script>
    function togglePw() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
  </script>
  <script src="/js/login.js"></script>
</body>
</html>
